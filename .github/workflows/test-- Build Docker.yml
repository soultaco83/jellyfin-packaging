name: "Test Branch - Build Docker"

on:
  workflow_dispatch:
    inputs:
      version:
        required: false
        type: string
        default: 'master'
        description: 'The server and web stable release tag ("vX.Y.Z") or "master"'

permissions:
  contents: write

jobs:
  update-submodules:
    runs-on: ubuntu-24.04
    outputs:
      build_branch: ${{ env.BUILD_BRANCH }}
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          submodules: false
          
      - name: "Create and switch to test build branch"
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Create or switch to a dedicated branch for test builds
          BUILD_BRANCH="test-build-$(date +'%Y%m%d-%H%M%S')"
          git checkout -b $BUILD_BRANCH
          echo "BUILD_BRANCH=$BUILD_BRANCH" >> $GITHUB_ENV
          echo "Created test build branch: $BUILD_BRANCH"

      - name: "Remove existing submodule folders"
        run: |
          rm -rf jellyfin-server
          rm -rf jellyfin-web
          rm -rf jellyfin-server-windows
          rm -rf jellyfin-requests
          
      - name: "Install Python dependencies"
        run: |
          pip install GitPython PyYAML
          
      - name: "Initialize and update submodules"
        run: |
          git submodule update --init
          
      - name: "Update jellyfin-server to test branch"
        run: |
          cd jellyfin-server
          
          # Fetch all branches from origin
          git fetch origin
          
          # Check if the test branch exists
          if git show-ref --verify --quiet refs/remotes/origin/test; then
            echo "Test branch exists, checking it out..."
            git checkout -B test origin/test
            git pull origin test
            echo "Successfully checked out jellyfin-server test branch"
            
            # Show current commit info
            echo "Current jellyfin-server commit:"
            git log -1 --oneline
          else
            echo "Warning: Test branch not found in jellyfin-server, using master"
            git checkout -B master origin/master
            git pull origin master
            echo "Current jellyfin-server commit (master fallback):"
            git log -1 --oneline
          fi
          
      - name: "Update other submodules to master"
        run: |
          # Update jellyfin-web to master
          cd jellyfin-web
          git fetch origin
          git checkout -B master origin/master
          git pull origin master
          echo "Current jellyfin-web commit:"
          git log -1 --oneline
          cd ..
          
          # Update jellyfin-requests to master
          cd jellyfin-requests
          git fetch origin
          git checkout -B master origin/master
          git pull origin master
          echo "Current jellyfin-requests commit:"
          git log -1 --oneline
          cd ..
          
      - name: "Show submodule status"
        run: |
          echo "=== Submodule Status ==="
          git submodule status
          echo ""
          echo "=== Jellyfin-server branch ==="
          cd jellyfin-server && git branch -v && cd ..
          echo ""
          echo "=== Jellyfin-web branch ==="  
          cd jellyfin-web && git branch -v && cd ..
          echo ""
          echo "=== Jellyfin-requests branch ==="
          cd jellyfin-requests && git branch -v && cd ..
          
      - name: "Commit and push changes"
        run: |
          git add -A
          git commit -m "Update submodules: jellyfin-server -> test, others -> master" || echo "No changes to commit"
          git push origin $BUILD_BRANCH
          echo "Pushed changes to branch: $BUILD_BRANCH"
          
  docker-build:
    needs: update-submodules
    runs-on: ubuntu-24.04
    steps:
      - name: "Checkout updated repository"
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-submodules.outputs.build_branch }}
          fetch-depth: 0
          submodules: true
          
      - name: "Set version and release type"
        id: version
        run: |
          INPUT_VERSION="${{ inputs.version || 'master' }}"
          
          if [[ "$INPUT_VERSION" == "master" ]]; then
            echo "JELLYFIN_VERSION=$(date +'%Y%m%d%H')" >> $GITHUB_ENV
            echo "JELLYFIN_RELEASE_TYPE=unstable" >> $GITHUB_ENV
          elif [[ "$INPUT_VERSION" =~ ^v[0-9]+ ]]; then
            echo "JELLYFIN_VERSION=$INPUT_VERSION" >> $GITHUB_ENV
            echo "JELLYFIN_RELEASE_TYPE=stable" >> $GITHUB_ENV
          else
            echo "Invalid version input"
            exit 1
          fi
          
          echo "BUILD_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV
          
          echo "Building test version with jellyfin-server test branch"
          
      - name: "Install dependencies"
        run: |
          sudo apt-get update
          sudo apt-ge install --yes python3-yaml
          pip install GitPython
          
      - name: "Set permissions for docker-entrypoint.sh"
        run: |
          if [ -f "docker/docker-entrypoint.sh" ]; then
            chmod +x docker/docker-entrypoint.sh
          else
            echo "docker-entrypoint.sh not found, checking directory structure"
            find . -name "docker-entrypoint.sh"
          fi
          
      - name: "Show submodule commit info before build"
        run: |
          echo "=== Building with these submodule commits ==="
          echo "Jellyfin-server (test branch):"
          cd jellyfin-server && git log -1 --pretty=format:"  Branch: %D%n  Commit: %H%n  Author: %an%n  Date: %ad%n  Message: %s%n" && cd ..
          echo ""
          echo "Jellyfin-web (master):"
          cd jellyfin-web && git log -1 --pretty=format:"  Branch: %D%n  Commit: %H%n  Author: %an%n  Date: %ad%n  Message: %s%n" && cd ..
          echo ""
          echo "Jellyfin-requests (master):"
          cd jellyfin-requests && git log -1 --pretty=format:"  Branch: %D%n  Commit: %H%n  Author: %an%n  Date: %ad%n  Message: %s%n" && cd ..
          echo ""
          
      - name: "Run builder for Docker containers"
        id: build
        continue-on-error: true
        run: |
          sudo --preserve-env ./build.py ${{ env.JELLYFIN_VERSION }} docker amd64 --local
          
      - name: "Debug: List Docker images"
        run: docker images
        
      - name: Log in to Docker Hub
        id: login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        run: |
          SOURCE_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "${{ env.JELLYFIN_VERSION }}-amd64" | head -n 1)
          
          if [ -z "$SOURCE_IMAGE" ]; then
            echo "Error: Could not find the source image"
            docker images
            exit 1
          fi
          
          echo "Found source image: ${SOURCE_IMAGE}"
          
          # Tag and push to test tag
          echo "Tagging and pushing as: soultaco83/jellyfin_with_request:test"
          docker tag "${SOURCE_IMAGE}" "soultaco83/jellyfin_with_request:test"
          docker push "soultaco83/jellyfin_with_request:test"
          
          echo "Successfully pushed Docker image to test tag!"
