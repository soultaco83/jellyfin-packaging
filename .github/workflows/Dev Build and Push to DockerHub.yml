name: "Dev Build and Push to DockerHub"

on:
  schedule:
    - cron: '0 11 * * 0'  # Runs at 6AM EST sunday
  workflow_dispatch:
    inputs:
      version:
        required: false
        type: string
        default: 'master'
        description: 'The server and web stable release tag ("vX.Y.Z") or "master"'

permissions:
  contents: write

jobs:
  UpdateAndBuild:
    runs-on: ubuntu-24.04
    steps:
      - name: "Set version and release type"
        id: version
        run: |
          INPUT_VERSION="${{ inputs.version || 'master' }}"
          if [[ "$INPUT_VERSION" == "master" ]]; then
            echo "JELLYFIN_VERSION=$(date +'%Y%m%d%H')" >> $GITHUB_ENV
            echo "JELLYFIN_RELEASE_TYPE=unstable" >> $GITHUB_ENV
          elif [[ "$INPUT_VERSION" =~ ^v[0-9]+ ]]; then
            echo "JELLYFIN_VERSION=$INPUT_VERSION" >> $GITHUB_ENV
            echo "JELLYFIN_RELEASE_TYPE=stable" >> $GITHUB_ENV
          else
            echo "Invalid version input"
            exit 1
          fi
          echo "BUILD_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV
          echo "Input version: $INPUT_VERSION"
          echo "Set JELLYFIN_VERSION: ${{ env.JELLYFIN_VERSION }}"
          echo "Set JELLYFIN_RELEASE_TYPE: ${{ env.JELLYFIN_RELEASE_TYPE }}"
          echo "Set BUILD_DATE: ${{ env.BUILD_DATE }}"
          
      - name: "Install dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install --yes python3-git python3-yaml

      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: "Configure Git"
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
      - name: "Remove existing submodules"
        run: |
          # Remove .gitmodules file
          if [ -f .gitmodules ]; then
            rm .gitmodules
            echo "Removed .gitmodules file"
          fi
          
          # Remove existing submodule folders
          for dir in jellyfin-server jellyfin-web jellyfin-server-windows jellyfin-requests; do
            if [ -d "$dir" ]; then
              rm -rf "$dir"
              echo "Removed $dir directory"
            fi
          done
          
          # Remove git references to submodules
          git rm -rf --cached jellyfin-server jellyfin-web jellyfin-server-windows jellyfin-requests || true
          
      - name: "Create new .gitmodules file"
        run: |
          cat > .gitmodules << 'EOF'
          [submodule "jellyfin-server"]
            path = jellyfin-server
            url = https://github.com/soultaco83/jellyfin-server.git
          [submodule "jellyfin-web"]
            path = jellyfin-web
            url = https://github.com/soultaco83/jellyfin-web-requeststab.git
          [submodule "jellyfin-server-windows"]
            path = jellyfin-server-windows
            url = https://github.com/jellyfin/jellyfin-server-windows.git
          [submodule "jellyfin-requests"]
            path = jellyfin-requests
            url = https://github.com/soultaco83/Jellyfin_requests_plugin.git
          EOF
          
          git add .gitmodules
          
      - name: "Initialize and update submodules"
        run: |
          git submodule update --init
          
      - name: "Run checkout.py script"
        run: |
          chmod +x checkout.py
          ./checkout.py ${{ inputs.version || 'master' }}
          
      - name: "Commit and push changes"
        run: |
          git add .
          git commit -m "Update submodules to ${{ env.JELLYFIN_VERSION }}" || echo "No changes to commit"
          git push
          
      - name: Set permissions for docker-entrypoint.sh
        run: |
          if [ -f docker/docker-entrypoint.sh ]; then
            chmod +x docker/docker-entrypoint.sh
          else
            echo "docker-entrypoint.sh not found"
          fi

      - name: "Run builder for Docker containers"
        id: build
        continue-on-error: true
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          sudo --preserve-env ./build.py ${{ env.JELLYFIN_VERSION }} docker amd64 --local
          
      - name: Log in to Docker Hub
        id: login
        continue-on-error: true
        uses:
