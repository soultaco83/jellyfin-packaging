name: "Dev Build and Push to DockerHub"

on:
  workflow_dispatch:
    inputs:
      version:
        required: false
        type: string
        default: 'master'
        description: 'The server and web stable release tag ("vX.Y.Z") or "master"'

permissions:
  contents: read

jobs:
  check_branch:
    runs-on: ubuntu-24.04
    steps:
      - name: Check if running on dev branch
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/dev" ]]; then
            echo "Error: This workflow can only run on the dev branch"
            exit 1
          fi

  Docker:
    needs: check_branch
    runs-on: ubuntu-24.04
    steps:
      - name: "Set version and release type"
        id: version
        run: |
          INPUT_VERSION=${{ inputs.version }}
          if [[ "$INPUT_VERSION" == "master" ]]; then
            echo "JELLYFIN_VERSION=$(date +'%Y%m%d%H')" >> $GITHUB_ENV
            echo "JELLYFIN_RELEASE_TYPE=unstable" >> $GITHUB_ENV
          elif [[ "$INPUT_VERSION" =~ ^v[0-9]+ ]]; then
            echo "JELLYFIN_VERSION=$INPUT_VERSION" >> $GITHUB_ENV
            echo "JELLYFIN_RELEASE_TYPE=stable" >> $GITHUB_ENV
          else
            echo "Invalid version input"
            exit 1
          fi
          # Set today's date for image tags
          echo "BUILD_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV
          echo "Input version: $INPUT_VERSION"
          echo "Set JELLYFIN_VERSION: ${{ env.JELLYFIN_VERSION }}"
          echo "Set JELLYFIN_RELEASE_TYPE: ${{ env.JELLYFIN_RELEASE_TYPE }}"
          echo "Set BUILD_DATE: ${{ env.BUILD_DATE }}"

      - name: "Install dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install --yes python3-git python3-yaml

      - name: "Checkout repository"
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: "Prepare repository"
        run: |
          ./checkout.py ${{ inputs.version }}

      - name: List directory contents
        run: |
          echo "Current working directory:"
          pwd
          echo "Contents of current directory:"
          ls -la
          echo "Contents of docker directory (if exists):"
          ls -la docker/ || echo "docker directory not found"

      - name: Set permissions for docker-entrypoint.sh
        run: chmod +x docker/docker-entrypoint.sh

      - name: "Run builder for Docker containers"
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          sudo --preserve-env ./build.py ${{ env.JELLYFIN_VERSION }} docker amd64 --local

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "Debug: List Docker images"
        run: docker images

      - name: Push to Docker Hub
        run: |
          ARCHITECTURES=("amd64")
          for ARCH in "${ARCHITECTURES[@]}"; do
            SOURCE_IMAGE="soultaco83/jellyfin_with_request:${{ env.JELLYFIN_VERSION }}-${ARCH}"
            DEV_IMAGE="soultaco83/jellyfin_with_request:dev-${ARCH}"
            DATE_DEV_IMAGE="soultaco83/jellyfin_with_request:${{ env.BUILD_DATE }}-dev-${ARCH}"
            
            echo "Attempting to push image for ${ARCH}"
            if docker image inspect "${SOURCE_IMAGE}" &> /dev/null; then
              # Tag with dev branch
              echo "Tagging image for dev branch..."
              docker tag "${SOURCE_IMAGE}" "${DEV_IMAGE}"
              docker push "${DEV_IMAGE}"
              
              # Tag with date-dev
              echo "Tagging image with date-dev..."
              docker tag "${SOURCE_IMAGE}" "${DATE_DEV_IMAGE}"
              docker push "${DATE_DEV_IMAGE}"
            else
              echo "Warning: Docker image ${SOURCE_IMAGE} not found. Skipping."
            fi
          done

      - name: Create and Push Dev Multi-Arch Manifests
        run: |
          # Create and push regular dev manifest
          DEV_MANIFEST="soultaco83/jellyfin_with_request:dev"
          echo "Creating dev multi-arch manifest ${DEV_MANIFEST}"
          docker manifest create "${DEV_MANIFEST}" \
            "soultaco83/jellyfin_with_request:dev-amd64"
          docker manifest push "${DEV_MANIFEST}"
          
          # Create and push date-based dev manifest
          DATE_DEV_MANIFEST="soultaco83/jellyfin_with_request:${{ env.BUILD_DATE }}-dev"
          echo "Creating date-dev multi-arch manifest ${DATE_DEV_MANIFEST}"
          docker manifest create "${DATE_DEV_MANIFEST}" \
            "soultaco83/jellyfin_with_request:${{ env.BUILD_DATE }}-dev-amd64"
          docker manifest push "${DATE_DEV_MANIFEST}"
